// ─── GAME ENGINE ────────────────────────────────────
const CW={passingAccuracy:{r:["tha","hgt"],w:[1,0.2]},passingDeep:{r:["thp","tha","hgt"],w:[1,0.1,0.2]},passingVision:{r:["thv","hgt"],w:[1,0.5]},athleticism:{r:["stre","spd","hgt"],w:[1,1,0.2]},rushing:{r:["stre","spd","elu"],w:[0.5,1,1]},catching:{r:["hgt","hnd"],w:[0.2,1]},gettingOpen:{r:["hgt","spd","rtr","hnd"],w:[1,0.25,2,1]},speed:{r:["spd"],w:[1]},passBlocking:{r:["hgt","stre","spd","pbk"],w:[0.5,1,0.2,1]},runBlocking:{r:["hgt","stre","spd","rbk"],w:[0.5,1,0.4,1]},passRushing:{r:["hgt","stre","spd","prs","tck"],w:[1,1,0.5,1,0.25]},runStopping:{r:["hgt","stre","spd","rns","tck"],w:[0.5,1,0.5,1,0.4]},passCoverage:{r:["hgt","spd","pcv"],w:[0.1,1,1]},tackling:{r:["spd","stre","tck"],w:[1,1,2.5]},avoidingSacks:{r:["thv","elu","stre"],w:[1,1,0.25]},ballSecurity:{r:["bsc","stre"],w:[1,0.2]},kickingPower:{r:["kpw"],w:[1]},kickingAccuracy:{r:["kac"],w:[1]},punting:{r:["ppw","pac"],w:[1,1]}};
const PIF={QB:{passingAccuracy:[3,1],passingDeep:[3,1],passingVision:[3,1],athleticism:[1,1],rushing:[1,1],avoidingSacks:[1,1],ballSecurity:[1,1],constant0:[-1.25,1]},RB:{rushing:[10,1],catching:[2,1],gettingOpen:[1,1],passBlocking:[1,1],runBlocking:[1,1],ballSecurity:[1,1],constant0:[-1.25,1]},WR:{catching:[5,1],gettingOpen:[5,1],rushing:[1,1],ballSecurity:[1,1],constant0:[1.25,1]},TE:{catching:[2,1],gettingOpen:[2,1],passBlocking:[2,1],runBlocking:[2,1],constant0:[-0.525,1]},OL:{passBlocking:[3,1],runBlocking:[3,1],constant0:[0.75,1]},DL:{passRushing:[5,1],runStopping:[5,1],tackling:[1,1],constant0:[0.25,1]},LB:{passRushing:[2,1],runStopping:[2,1],passCoverage:[1,1],tackling:[4,1],constant0:[-0.75,1]},CB:{passCoverage:[4.2,1],constant0:[1,1]},S:{passCoverage:[2,1],tackling:[1,1],constant0:[0.1,1]},K:{kickingPower:[1,1],kickingAccuracy:[1,1]},P:{punting:[1,1]}};
const PP=["QB","RB","WR","TE","OL","DL","LB","CB","S","K","P"];
const RK=["hgt","stre","spd","endu","thv","thp","tha","bsc","elu","rtr","hnd","pbk","rbk","pcv","tck","prs","rns","kpw","kac","ppw","pac"];
const TPW={QB:[0.1253],RB:[0.0503],WR:[0.0388,0.0256,0.0226],TE:[0.0158],OL:[0.0961,0.0897,0.0863,0.0823,0.0609],DL:[0.1488,0.1026,0.0915,0.0333],LB:[0.0666,0.0475],CB:[0.0612,0.06],S:[0.0426,0.0371],K:[0.0344],P:[0.019]};
const PSC={QB:3,RB:4,WR:6,TE:3,OL:9,DL:9,LB:7,CB:5,S:5,K:1,P:1};
const PC={QB:"#e63946",RB:"#e76f51",WR:"#f4a261",TE:"#e9c46a",OL:"#2a9d8f",DL:"#3d6b7a",LB:"#457b9d",CB:"#6a4c93",S:"#8338ec",K:"#3a86a7",P:"#48a9a6"};
const PL={QB:"Quarterback",RB:"Running Back",WR:"Wide Receiver",TE:"Tight End",OL:"Off. Line",DL:"Def. Line",LB:"Linebacker",CB:"Cornerback",S:"Safety",K:"Kicker",P:"Punter"};
const GM={QB:"OFF",RB:"OFF",WR:"OFF",TE:"OFF",OL:"OFF",DL:"DEF",LB:"DEF",CB:"DEF",S:"DEF",K:"ST",P:"ST"};
const RN={hgt:"Height",stre:"Strength",spd:"Speed",endu:"Endurance",thv:"Throw Vision",thp:"Throw Power",tha:"Throw Acc.",bsc:"Ball Security",elu:"Elusiveness",rtr:"Route Running",hnd:"Hands",pbk:"Pass Block",rbk:"Run Block",pcv:"Pass Coverage",tck:"Tackling",prs:"Pass Rush",rns:"Run Stopping",kpw:"Kick Power",kac:"Kick Acc.",ppw:"Punt Power",pac:"Punt Acc."};
const bd=(x,a,b)=>Math.min(b,Math.max(a,x));
const cR=(rt,c,w)=>{let n=0,d=0;for(let i=0;i<c.length;i++){n+=(typeof c[i]==="number"?c[i]:(rt[c[i]]||0))*w[i];d+=100*w[i];}return bd(n/d,0,1);};
const cO=(rt,pos)=>{const cs={constant0:0};for(const[k,v]of Object.entries(CW))cs[k]=cR(rt,v.r,v.w);const info=PIF[pos];if(!info)return 0;let r=0,s=0;for(const[k,[c,p]]of Object.entries(info)){r+=c*(100/Math.pow(100,p))*Math.pow(cs[k]||0,p);s+=c;}r=(r/s)*100;let f=0;if(r>=68)f=15;else if(r>=62)f=5+(r-62)*(10/6);else if(r>=59)f=(r-59)*(5/3);else if(r>=52)f=-5+(r-52)*(5/7);else if(r>=40)f=-15+(r-40)*(10/12);else f=-15;r=bd(Math.round(r+f),0,100);if(pos==="K"||pos==="P")r=Math.round(r*0.75);return r;};
const bP=rt=>{let b="QB",bo=0;PP.forEach(p=>{const o=cO(rt,p);if(o>bo){bo=o;b=p;}});return{pos:b,ovr:bo};};
// Aging projection from developSeason.football.ts
const IQ_RATINGS=new Set(["thv","elu","rtr","hnd","rbk","pbk","pcv","tck","prs","rns","kac","pac"]);
const PWR_RATINGS=new Set(["thp","tha","kpw","ppw"]);
const baseChg=age=>age<=21?2:age<=25?1:age<=27?0:age<=29?-1:age<=31?-2:age<=34?-3:-4;
const ageMod=(key,age,mode)=>{
if(key==="hgt"){if(mode==="prog35")return age<=27?0.3:age<=30?-0.7:-1.2;return -(baseChg(age));}
if(key==="spd")return age<=27?0:age<=30?-2:-4;
if(key==="endu")return age<=23?4:age<=30?0:-4;
if(mode==="prog35"){
// ProgCode 3.5: hnd/rtr use power formula (more resilient)
if(key==="hnd"||key==="rtr"){const pm=age<=27?0:age<=29?0.5:age<=31?1.5:2;return pm;}
// ProgCode 3.5: elu drops hard after 28
if(key==="elu")return age>=28?-4:0;
}
if(IQ_RATINGS.has(key))return age<=21?3:age<=23?2:age<=27?0:age<=29?0.5:age<=31?1.5:2;
if(PWR_RATINGS.has(key))return age<=27?0:age<=29?0.5:age<=31?1.5:2;
return 0;
};
const projectRatings=(rt,age,seasons,mode)=>{
const proj=[];let cur={};RK.forEach(k=>cur[k]=rt[k]||0);
for(let s=0;s<seasons;s++){
const a=age+s;const next={};
RK.forEach(k=>{const chg=baseChg(a)+ageMod(k,a,mode);next[k]=bd(Math.round(cur[k]+chg),0,100);});
next.pos=rt.pos;cur=next;
const bp=bP(cur);proj.push({age:a+1,rt:{...cur},ovr:bp.ovr,pos:bp.pos});}
return proj;};
const aP=(age,pos)=>{const sp=["RB","CB","WR","S"],iq=["QB","OL","K","P"];if(age<=22)return{l:"Dev",e:"🌱",c:"#2ecc71"};if(age<=25)return{l:"Rise",e:"📈",c:"#3498db"};if(age<=27)return{l:"Prime",e:"⭐",c:"#f1c40f"};if(age<=29)return sp.includes(pos)?{l:"Decl.",e:"⚠️",c:"#e67e22"}:{l:"Late P.",e:"⭐",c:"#f1c40f"};if(age<=31)return iq.includes(pos)?{l:"Vet",e:"🔶",c:"#e67e22"}:{l:"Decl.",e:"🔻",c:"#e74c3c"};return iq.includes(pos)?{l:"Late V.",e:"🔻",c:"#e74c3c"}:{l:"Done",e:"❌",c:"#c0392b"};};
const pG=a=>{if(a>=75)return{g:"A+",c:"#00e676"};if(a>=70)return{g:"A",c:"#2ecc71"};if(a>=65)return{g:"B+",c:"#66bb6a"};if(a>=60)return{g:"B",c:"#f1c40f"};if(a>=55)return{g:"C+",c:"#ffa726"};if(a>=50)return{g:"C",c:"#e67e22"};if(a>=45)return{g:"D",c:"#e74c3c"};return{g:"F",c:"#c0392b"};};
const fS=a=>!a?"–":a>=1000?`$${(a/1000).toFixed(1)}M`:`$${a}K`;

// ─── TRADE ENGINE (full ValueChangeCalculator port) ───
const TRADE_EXP=3;const SPORT_FACTOR=2.5;
const tradeCalc=(data)=>{
if(!data)return null;
const allP=data.players.filter(p=>p.tid>=0);const numTeams=data.teams.filter(t=>t.tid>=0).length;
// z-score: game uses playerOvrMean/Std based on OVRs
const ovrs=allP.map(p=>p.ovr);
const ovrMean=ovrs.length?ovrs.reduce((s,v)=>s+v,0)/ovrs.length:47;
const ovrStd=(()=>{if(ovrs.length<2)return 10;const v=ovrs.reduce((s,x)=>s+Math.pow(x-ovrMean,2),0)/(ovrs.length-1);return Math.sqrt(v)||10;})();
const zs=v=>(v-ovrMean)/ovrStd;
const capAmt=data.capSettings?.salaryCap||200000;
const minC=data.capSettings?.minContract||500;const maxC=data.capSettings?.maxContract||30000;
const difficulty=data.difficulty||0;
const diffFudge=Math.max(0,1+0.1*difficulty);// Normal=1.0, Hard=1.1, Insane=1.2
const fudge=1.05*diffFudge;// AI overvalues own players 5% + difficulty
const MIN_VAL=-1,MAX_VAL=3;
// Contract value (source: getContractValue)
const contractVal=(amount,exp,normVal)=>{
const season=data.season;if(!exp||exp<=season)return 0;
const sCap=capAmt||200000;const normAmount=amount/sCap;
const slope=(maxC/sCap-minC/sCap)/(MAX_VAL-MIN_VAL);
const expected=slope*(normVal-MIN_VAL);return Math.min(expected-normAmount,0.1);};
// Team OVR ranking for pick estimation
const teamOvrs=data.teams.filter(t=>t.tid>=0).map(t=>{
const tp=allP.filter(p=>p.tid===t.tid);const tov=calcTeamVal(tp.map(p=>({pos:p.pos,val:p.ovr})));
return{tid:t.tid,ovr:tov,won:t.won||0,lost:t.lost||0};}).sort((a,b)=>b.ovr-a.ovr);
// Est win% from OVR rank (source: ovrIndexToEstWinPercent)
const estWinPct=(ovrIdx)=>0.25+(0.5*(numTeams-1-ovrIdx))/(numTeams-1);
// Est pick position per team (source: getEstPicks)
const numGames=data.numGames||17;
const estPicks={};
const wps=teamOvrs.map((t,idx)=>{
const gp=t.won+t.lost;const sf=numGames>0?gp/numGames:0;
const ovrWp=estWinPct(idx);
const wp=gp===0?ovrWp:sf*(t.won/gp)+(1-sf)*ovrWp;
return{tid:t.tid,wp};});
wps.sort((a,b)=>a.wp-b.wp);
wps.forEach((w,i)=>{estPicks[w.tid]=i+1;});
// Pick values from undrafted prospects
const prospects=data.players.filter(p=>p.tid===-2).sort((a,b)=>(b.value||0)-(a.value||0));
const picksByYear={};prospects.forEach(p=>{const y=p.draftYear||data.season;if(!picksByYear[y])picksByYear[y]=[];picksByYear[y].push(p.value||p.valueFuzz||0);});
const numPicksTotal=numTeams*(data.numDraftRounds||7);
const defaultPickVals=(()=>{const years=Object.keys(picksByYear);
return Array.from({length:numPicksTotal},(_,i)=>{const vals=years.map(y=>(picksByYear[y]||[])[i]).filter(v=>v!==undefined);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;});})();
const getPickVal=(season,estPickNum)=>{const pv=picksByYear[season];if(pv&&pv[estPickNum-1]!==undefined)return pv[estPickNum-1];return defaultPickVals[estPickNum-1]||0;};
// Get modified pick rank after trade (source: getModifiedPickRank)
const getModPickRank=(tid,pidsAdd,pidsRemove)=>{
const curPlayers=allP.filter(p=>p.tid===tid);
const after=curPlayers.filter(p=>!pidsRemove.includes(p.pid));
pidsAdd.forEach(pid=>{const p=data.players.find(x=>x.pid===pid);if(p)after.push(p);});
const newOvr=calcTeamVal(after.map(p=>({pos:p.pos,val:p.ovr})));
const otherOvrs=teamOvrs.filter(t=>t.tid!==tid);
let newIdx=otherOvrs.findIndex(t=>t.ovr<newOvr);if(newIdx===-1)newIdx=otherOvrs.length;
const newWp=estWinPct(newIdx);
const t=teamOvrs.find(x=>x.tid===tid);const gp=t?(t.won+t.lost):0;const sf=numGames>0?gp/numGames:0;
const wp=gp===0?newWp:sf*(t.won/gp)+(1-sf)*newWp;
const otherWps=wps.filter(w=>w.tid!==tid);
let rank=otherWps.findIndex(w=>wp<w.wp);if(rank===-1)rank=otherWps.length;
return rank+1;};
// Make player asset (source: getPlayers) - isRemove applies fudge
const makePlayerAsset=(p,isRemove)=>{
const trueVal=p.value||p.valueFuzz||0;
let normVal=zs(trueVal);
// Fudge: AI overvalues what it gives up (only positive values)
if(isRemove&&normVal>0)normVal*=fudge;
const cv=contractVal(p.salary||0,p.expYear||0,zs(trueVal));
// Injury discount (source)
const inj=p.injury?.gamesRemaining||0;
let injDiscount=0;if(inj>75)injDiscount=0.75;else injDiscount=inj/100;
const justDrafted=p.draftYear&&p.draftYear===data.season-1;
return{val:normVal,cv,age:p.age,isPick:false,pid:p.pid,injDiscount,justDrafted,round:0};};
// Make pick asset (source: getPickNumber + getPickInfo)
const makePickAsset=(dp,tid,tradingPartnerTid,pidsAdd,pidsRemove)=>{
const season=dp.season||data.season;const nPR=numTeams;
let estPick;
if(dp.pick>0){estPick=dp.pick;}
else{
let temp=estPicks[dp.originalTid];
const tradeWithUser=tradingPartnerTid===data.userTid;
// Dynamic revaluation if trading with user
if(tid!==data.userTid&&dp.originalTid===tid&&tradeWithUser&&(pidsAdd||[]).length+(pidsRemove||[]).length>0){
temp=getModPickRank(tid,pidsAdd||[],pidsRemove||[]);}
estPick=temp!==undefined?temp:Math.round(nPR/2);
const usersPick=dp.tid===data.userTid;
const regTarget=(usersPick?0.75:0.25)*nPR;
let seasons=Math.max(0,Math.min(season-data.season,5));
if(tradeWithUser&&seasons>0)seasons=Math.min(seasons+1,5);
if(seasons===0)seasons+=0.5;
estPick=Math.round((estPick*(5-seasons))/5+(regTarget*seasons)/5);
// User pick penalty / AI pick bonus when trading with user
if(tradeWithUser&&seasons>0.5){
if(usersPick){const df=1+1.5*difficulty;estPick=Math.max(1,Math.min(Math.round((estPick+nPR/3.5)*df),nPR));}
else{estPick=Math.max(1,Math.min(Math.round(estPick-nPR/3.5),nPR));}}}
const pickNum=estPick+nPR*(dp.round-1);
const rawVal=getPickVal(season,pickNum);
return{val:zs(rawVal),cv:0,age:20,isPick:true,dpid:dp.dpid,round:dp.round,injDiscount:0,justDrafted:false};};
// Sum values with all factors (source: sumValues)
const sumAssets=(assets,strategy,includeInjuries)=>{
// First round pick protection
const r1picks=assets.filter(a=>a.isPick&&a.round===1);const otherPicks=assets.filter(a=>a.isPick&&a.round>1);
if(r1picks.length>2){const n=r1picks.length-2;r1picks.forEach(a=>{if(a.val>0)a.val*=1+n/SPORT_FACTOR;});}
if(otherPicks.length>2){const n=otherPicks.length-2;otherPicks.forEach(a=>{if(a.val>0)a.val*=1+n/(SPORT_FACTOR*a.round);});}
return assets.reduce((memo,a)=>{
let pv=a.val;
// Injury discount (only for incoming players)
if(includeInjuries&&a.injDiscount>0)pv-=pv*a.injDiscount;
// Negative values nearly worthless
if(pv<0)pv/=20;
// Contract value with strategy factor
const cf=strategy==="rebuilding"?2:0.5;
pv+=cf*a.cv;
// justDrafted floor
if(a.justDrafted)pv=Math.max(0,pv);
// Strategy adjustments
if(strategy==="rebuilding"){
if(a.isPick)pv*=1.1;
else if(a.age<=19)pv*=1.075;else if(a.age<=20)pv*=1.05;else if(a.age<=22)pv*=1.025;
else if(a.age===27)pv*=0.975;else if(a.age===28)pv*=0.95;else if(a.age>=29)pv*=0.9;
}else if(strategy==="contending"){
if(a.isPick)pv*=0.825;
else if(a.age<=19)pv*=0.8;else if(a.age<=20)pv*=0.825;else if(a.age<=21)pv*=0.85;
else if(a.age<=22)pv*=0.875;else if(a.age<=23)pv*=0.925;else if(a.age<=24)pv*=0.95;}
// EXPONENT
return memo+(pv>1?Math.pow(pv,TRADE_EXP):pv);
},0);};
return{ovrMean,ovrStd,zs,sumAssets,makePlayerAsset,makePickAsset,capAmt,fudge,estPicks,getModPickRank,difficulty};};

// ─── MOCK DRAFT ENGINE ─────────────────────────────
const INTERCEPT=-86.546;
const calcTeamVal=(players)=>{
const byPos={};players.forEach(p=>{const pos=p.pos||"QB";if(!byPos[pos])byPos[pos]=[];byPos[pos].push(p.val||0);});

for(let i=0;i<Math.min(teamPicks.length,MAXP);i++){for(let j=i+1;j<Math.min(teamPicks.length,MAXP);j++)tryOffer([],[teamPicks[i],teamPicks[j]]);}
// 2 players + 1 pick
for(let i=0;i<Math.min(teamP.length,6);i++){for(let j=i+1;j<Math.min(teamP.length,6);j++){for(const dp of teamPicks.slice(0,3))tryOffer([teamP[i],teamP[j]],[dp]);}}
// 1 player + 2 picks
for(const tp of teamP.slice(0,6)){for(let i=0;i<Math.min(teamPicks.length,4);i++){for(let j=i+1;j<Math.min(teamPicks.length,4);j++)tryOffer([tp],[teamPicks[i],teamPicks[j]]);}}
// 3 players
for(let i=0;i<Math.min(teamP.length,5);i++){for(let j=i+1;j<Math.min(teamP.length,5);j++){for(let k=j+1;k<Math.min(teamP.length,5);k++)tryOffer([teamP[i],teamP[j],teamP[k]],[]);}}
// 3 picks
for(let i=0;i<Math.min(teamPicks.length,4);i++){for(let j=i+1;j<Math.min(teamPicks.length,4);j++){for(let k=j+1;k<Math.min(teamPicks.length,4);k++)tryOffer([],[teamPicks[i],teamPicks[j],teamPicks[k]]);}}
});
let filtered=offers;
if(shopFilter==="PICKS")filtered=offers.filter(o=>o.players.length===0&&o.picks.length>0);
else if(shopFilter!=="ALL")filtered=offers.filter(o=>o.players.some(p=>p.pos===shopFilter));
return filtered.sort((a,b)=>b.dvMe-a.dvMe).slice(0,50);
},[shopPids,shopDpids,shopFilter,data,tEng,myTid]);
const nPS=useMemo(()=>new Set(nR.filter(n=>n.g==="F"||n.g==="D"||n.g==="C"||n.g==="C+"||n.shortage>0||n.diff<-5).map(n=>n.pos)),[nR]);

// Draft Pick Tracker
const draftTracker=useMemo(()=>{
if(!data||myTid===null)return null;
// Estimate draft position from standings
const standings=data.teams.map(t=>({tid:t.tid,abbrev:t.abbrev,won:t.won||0,lost:t.lost||0})).sort((a,b)=>a.won-b.won||(b.lost-a.lost));
const myRecord=standings.find(s=>s.tid===myTid);
// Use actual pick number if lottery has been run
const myR1=(data.draftPicks||[]).find(p=>p.season===data.season&&p.round===1&&p.tid===myTid);
const myPick=myR1&&myR1.pick>0?myR1.pick:standings.findIndex(s=>s.tid===myTid)+1;
const pickSource=myR1&&myR1.pick>0?"lottery":"standings";
// Actual draft picks owned
const myDraftPicks=(data.draftPicks||[]).filter(p=>p.tid===myTid).map(p=>{
const fromTeam=p.originalTid!==p.tid?data.teams.find(t=>t.tid===p.originalTid):null;
return{season:p.season,round:p.round,pick:p.pick||0,fromTeam:fromTeam?fromTeam.abbrev:null,isAcquired:p.originalTid!==p.tid};
}).sort((a,b)=>a.season-b.season||a.round-b.round);
// Picks traded away (originalTid is us but tid is someone else)
const tradedAway=(data.draftPicks||[]).filter(p=>p.originalTid===myTid&&p.tid!==myTid).map(p=>{
const toTeam=data.teams.find(t=>t.tid===p.tid);
return{season:p.season,round:p.round,toTeam:toTeam?toTeam.abbrev:"?",};
}).sort((a,b)=>a.season-b.season||a.round-b.round);
const pickYears=[...new Set(myDraftPicks.map(p=>p.season))].sort();
// Draft history
const history=data.players.filter(p=>p.draft&&p.draft.tid===myTid&&p.draft.round>0)
.map(p=>{const d=p.draft;const curOvr=p.ovr||0;
const dev=curOvr-d.ovr;
const grade=curOvr>=d.pot?"A+":curOvr>=d.pot*0.9?"A":curOvr>=d.pot*0.75?"B":curOvr>=d.pot*0.6?"C":curOvr>=d.ovr?"D":"F";
const gradeColor=grade.startsWith("A")?"#2ecc71":grade==="B"?"#f1c40f":grade==="C"?"#e67e22":"#e74c3c";
return{pid:p.pid,name:p.name,pos:p.pos,year:d.year,round:d.round,pick:d.pick,
dOvr:d.ovr,dPot:d.pot,curOvr,curPot:p.pot||0,tid:p.tid,dev,grade,gradeColor,onTeam:p.tid===myTid};})
.sort((a,b)=>b.year-a.year||a.round-b.round||a.pick-b.pick);
const histYears=[...new Set(history.map(h=>h.year))].sort((a,b)=>b-a).slice(0,4);
return{myPick,myRecord,pickSource,myDraftPicks,tradedAway,pickYears,history,years:histYears,standings};},[data,myTid]);

// Aging projections for entire roster (must come before capData)
const agingData=useMemo(()=>{
if(!myP.length)return{players:[],posForecasts:[],drops:[],risers:[],ageDist:[]};
const players=myP.map(p=>{const proj=projectRatings(p.rt,p.age,3,progMode);
return{...p,ovr1:proj[0]?.ovr||p.ovr,ovr2:proj[1]?.ovr||p.ovr,ovr3:proj[2]?.ovr||p.ovr,chg3:(proj[2]?.ovr||p.ovr)-p.ovr};});
// Position group forecast
const posForecasts=PP.map(pos=>{const pp=players.filter(p=>p.pos===pos).sort((a,b)=>b.ovr-a.ovr);const sc=(TPW[pos]||[1]).length;const st=pp.slice(0,sc);if(!st.length)return{pos,now:0,y1:0,y2:0,y3:0,chg:0};
const avg=arr=>st.length?Math.round(arr.reduce((s,v)=>s+v,0)/st.length):0;
return{pos,now:avg(st.map(p=>p.ovr)),y1:avg(st.map(p=>p.ovr1)),y2:avg(st.map(p=>p.ovr2)),y3:avg(st.map(p=>p.ovr3)),chg:avg(st.map(p=>p.ovr3))-avg(st.map(p=>p.ovr))};}).filter(f=>f.now>0);
// Top drops & risers
const sorted=[...players].sort((a,b)=>a.chg3-b.chg3);
const drops=sorted.filter(p=>p.chg3<0).slice(0,7);
const risers=[...players].sort((a,b)=>b.chg3-a.chg3).filter(p=>p.chg3>0).slice(0,7);
// Age distribution
const phases={Dev:0,Rise:0,Prime:0,"Late P.":0,Decl:0,Vet:0,Done:0};
players.forEach(p=>{const key=p.phase.l.replace(".","");if(key in phases)phases[key]++;else{const k2=Object.keys(phases).find(k=>key.startsWith(k));if(k2)phases[k2]++;}});
const ageDist=Object.entries(phases).filter(([,v])=>v>0).map(([k,v])=>({label:k,count:v}));
return{players,posForecasts,drops,risers,ageDist};},[myP,progMode]);

// Cap/salary analysis (depends on agingData)
const capData=useMemo(()=>{
if(!myP.length||!data)return null;
const total=myP.reduce((s,p)=>s+p.salary,0);
const expRel=expP.reduce((s,p)=>s+p.salary,0);
const cap=data.capSettings||{};
const byPos=PP.map(pos=>{const pp=myP.filter(p=>p.pos===pos);const sum=pp.reduce((s,p)=>s+p.salary,0);return{pos,sum,count:pp.length,avg:pp.length?Math.round(sum/pp.length):0};}).sort((a,b)=>b.sum-a.sum);
const maxPosSal=Math.max(...byPos.map(p=>p.sum),1);
const ap=agingData.players||[];const apMap={};ap.forEach(p=>{apMap[p.pid]=p;});
const enriched=myP.map(p=>{const ag=apMap[p.pid];const chg3=ag?ag.chg3:0;const ovr3=ag?ag.ovr3:p.ovr;
const projEnd=Math.round(p.ovr+chg3*Math.min(p.yrsLeft,3)/3);return{...p,chg3,ovr3,projEnd};});
const badContracts=enriched.filter(p=>p.salary>=3000&&p.yrsLeft>=2&&p.projEnd<65)
.map(p=>({...p,badScore:p.salary*(65-p.projEnd)*p.yrsLeft/1000}))
.sort((a,b)=>b.badScore-a.badScore).slice(0,7);
const extWatch=enriched.filter(p=>p.yrsLeft<=1&&p.ovr>=55&&p.age<=30)
.sort((a,b)=>b.ovr-a.ovr).slice(0,7);
const posAvg={};PP.forEach(pos=>{const pp=enriched.filter(p=>p.pos===pos);if(pp.length)posAvg[pos]=Math.round(pp.reduce((s,p)=>s+p.ovr,0)/pp.length);});
const cuts=enriched.filter(p=>p.salary>=2000&&posAvg[p.pos]&&p.ovr<posAvg[p.pos])
.map(p=>({...p,cutScore:p.salary*(posAvg[p.pos]-p.ovr)/1000,posAvgOvr:posAvg[p.pos]}))
.sort((a,b)=>b.cutScore-a.cutScore).slice(0,7);
const resignWatch=data.players.filter(p=>p.tid===-1&&p.statsTids&&p.statsTids.includes(myTid))
.sort((a,b)=>b.ovr-a.ovr).slice(0,10);
// VOR: Value Over Replacement — each player vs next man below them
const vor=(()=>{const byPos={};myP.forEach(p=>{if(!byPos[p.pos])byPos[p.pos]=[];byPos[p.pos].push(p);});
Object.values(byPos).forEach(arr=>arr.sort((a,b)=>b.ovr-a.ovr));
return myP.map(p=>{const group=byPos[p.pos]||[];const rank=group.findIndex(q=>q.pid===p.pid);
const next=group[rank+1]||null;const nextOvr=next?next.ovr:0;const vorVal=p.ovr-nextOvr;
const perVor=vorVal>0?Math.round(p.salary/vorVal):0;
return{...p,rank:rank+1,depthCount:group.length,nextOvr,nextName:next?next.name:"—",vorVal,perVor};}).sort((a,b)=>b.vorVal-a.vorVal);})();
return{total,cap,expRel,byPos,maxPosSal,badContracts,extWatch,cuts,resignWatch,vor};},[myP,data,expP,agingData]);

<div style={{fontSize:9,color:$.t3,marginTop:8}}>Highlighted = key ratings for {p1.pos}{p2.pos!==p1.pos?` / ${p2.pos}`:""}</div>
</div>;})()}
</>;})()}
</>}
</>}

{tab==="aging"&&<>
{/* Disclaimer */}
<div style={{padding:"8px 12px",marginBottom:12,borderRadius:8,background:$.comp,border:`1px solid ${$.compb}`,fontSize:11,color:$.t5,lineHeight:1.6}}>

<div style={{fontSize:15,fontWeight:700,color:$.t8,marginBottom:10}}>Age Distribution<Tip text="How many players are in each career phase. Dev (≤22) = developing. Rise (23-25) = improving. Prime (26-29) = peak years. Declining = past peak. A young roster has more future upside."/></div>
<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
{[{l:"Dev",e:"🌱",c:"#2ecc71",d:"≤22"},{l:"Rise",e:"📈",c:"#3498db",d:"23-25"},{l:"Prime",e:"⭐",c:"#f1c40f",d:"26-27"},{l:"Late P.",e:"⭐",c:"#f1c40f",d:"28-29"},{l:"Decl.",e:"⚠️",c:"#e67e22",d:"varies"},{l:"Vet",e:"🔶",c:"#e67e22",d:"28-31"},{l:"Done",e:"❌",c:"#c0392b",d:"32+"}].map(ph=>{
const count=agingData.ageDist.find(a=>a.label===ph.l.replace(".",""))?.count||0;

return <div key={ph.l} style={{padding:"8px 12px",borderRadius:8,background:$.row,border:`1px solid ${$.cb}`,textAlign:"center",minWidth:70}}>
<div style={{fontSize:16,marginBottom:2}}>{ph.e}</div>

</div>
</div>

{/* Risk & Opportunity */}
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>

{agingData.drops.length>0?agingData.drops.map((p,i)=><div key={p.pid} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 0",fontSize:12}}>
<span onClick={()=>setSelP(p)} style={{color:$.t,flex:1,cursor:"pointer",textDecoration:"underline",textDecorationColor:$.t2,textUnderlineOffset:2}}>{p.name}</span>

<span style={{...M,fontSize:11,fontWeight:700,color:"#e74c3c"}}>{p.ovr3}</span>
<span style={{...M,fontSize:10,color:"#e74c3c"}}>{p.chg3}</span>
</div>):<div style={{fontSize:12,color:$.t4}}>No major drops 👍</div>}
</div>
<div style={cs}>
<div style={{fontSize:14,fontWeight:700,color:"#2ecc71",marginBottom:6}}>📈 Biggest Risers (3y)</div>
{agingData.risers.length>0?agingData.risers.map((p,i)=><div key={p.pid} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 0",fontSize:12}}>
<span onClick={()=>setSelP(p)} style={{color:$.t,flex:1,cursor:"pointer",textDecoration:"underline",textDecorationColor:$.t2,textUnderlineOffset:2}}>{p.name}</span>
<span style={{...M,fontSize:10,color:PC[p.pos]}}>{p.pos}</span>
<span style={{fontSize:10,color:$.t5}}>{p.age}</span>
<span style={{...M,fontSize:11,color:$.t6}}>{p.ovr}</span>
<span style={{...M,fontSize:10,color:$.t4}}>→</span>
<span style={{...M,fontSize:11,fontWeight:700,color:"#2ecc71"}}>{p.ovr3}</span>
<span style={{...M,fontSize:10,color:"#2ecc71"}}>+{p.chg3}</span>
</div>):<div style={{fontSize:12,color:$.t4}}>No major risers</div>}
</div>
</div>

{/* Position Group Forecast */}
<div style={cs}>
<div style={{fontSize:15,fontWeight:700,color:$.t8,marginBottom:10}}>Position Group Forecast<Tip text="Projects each position group's starter OVR over 3 seasons using aging curves from the game source code. Red = declining, green = improving. Positions sorted worst decline first."/></div>
{(()=>{const sk=sort.key,sd=sort.dir;const sf=(a,b,k)=>sd==="asc"?a[k]-b[k]:b[k]-a[k];
const sorted=[...agingData.posForecasts].sort((a,b)=>sk==="now"?sf(a,b,"now"):sk==="y1"?sf(a,b,"y1"):sk==="y2"?sf(a,b,"y2"):sk==="y3"?sf(a,b,"y3"):sk==="chg"?sf(a,b,"chg"):sk==="pos"?(sd==="asc"?a.pos.localeCompare(b.pos):b.pos.localeCompare(a.pos)):a.chg-b.chg);
return <div style={{display:"flex",flexDirection:"column",gap:4}}>
<div style={{display:"grid",gridTemplateColumns:"36px 46px 46px 46px 46px 50px",gap:4,padding:"2px 4px"}}>
<SH label="Pos" sk="pos" align="center"/>
<SH label="Now" sk="now" align="center"/>
<SH label="+1y" sk="y1" align="center"/>
<SH label="+2y" sk="y2" align="center"/>
<SH label="+3y" sk="y3" align="center"/>
<SH label="Δ3y" sk="chg" align="center"/>
</div>
{sorted.map(f=><div key={f.pos} style={{display:"grid",gridTemplateColumns:"36px 46px 46px 46px 46px 50px",alignItems:"center",gap:4,padding:"4px 4px",borderRadius:5,background:f.chg<=-3?$.gbad:f.chg>=2?$.ggood:"transparent"}}>
<span style={{...M,fontWeight:700,fontSize:12,color:PC[f.pos],textAlign:"center"}}>{f.pos}</span>
<span style={{...M,textAlign:"center",fontSize:13,fontWeight:700,color:$.t0}}>{f.now}</span>
<span style={{...M,textAlign:"center",fontSize:13,color:f.y1<f.now?"#e74c3c":f.y1>f.now?"#2ecc71":$.t6}}>{f.y1}</span>
<span style={{...M,textAlign:"center",fontSize:13,color:f.y2<f.now?"#e74c3c":f.y2>f.now?"#2ecc71":$.t6}}>{f.y2}</span>
<span style={{...M,textAlign:"center",fontSize:13,color:f.y3<f.now?"#e74c3c":f.y3>f.now?"#2ecc71":$.t6}}>{f.y3}</span>
<span style={{...M,textAlign:"center",fontSize:12,fontWeight:700,color:f.chg>0?"#2ecc71":f.chg>=-3?"#e67e22":"#e74c3c"}}>{f.chg>0?"+":""}{f.chg}</span>
</div>)}
</div>;})()}
</div>

{/* Full Roster Aging Table */}
<div style={cs}>
<div style={{fontSize:15,fontWeight:700,color:$.t8,marginBottom:10}}>Roster Aging Table<Tip text="Every player with projected OVR for +1, +2, +3 years. Based on deterministic aging curves — actual development includes random variance. Pot shows the ceiling the game uses."/></div>
<div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:8}}>{["ALL","OFF","DEF","ST",...PP].map(f=><button key={f} onClick={()=>setPf(f)} style={{padding:"4px 8px",border:"none",borderRadius:4,cursor:"pointer",fontSize:11,fontFamily:PP.includes(f)?"'JetBrains Mono',monospace":"'DM Sans',sans-serif",fontWeight:pf===f?700:400,background:pf===f?(PC[f]||$.acc2):$.fil,color:pf===f?"#fff":$.filt}}>{f}</button>)}</div>
<div style={{display:"grid",gridTemplateColumns:"minmax(100px,1fr) 32px 28px 38px 36px 38px 38px 38px 44px",gap:4,padding:"0 4px",marginBottom:4}}>
<SH label="Name" sk="name"/><SH label="Pos" sk="pos" align="center"/><SH label="Age" sk="age" align="center"/>
<SH label="Now" sk="ovr" align="center"/>

<div key={p.pid} style={{display:"grid",gridTemplateColumns:"minmax(100px,1fr) 32px 28px 38px 36px 38px 38px 38px 44px",alignItems:"center",gap:4,padding:"5px 4px",borderRadius:5,fontSize:12,background:p.chg3<=-5?$.gbad:p.chg3>=5?$.ggood:i%2===0?$.row:"transparent"}}>
<span onClick={()=>setSelP(p)} style={{fontWeight:600,color:$.t,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",cursor:"pointer",textDecoration:"underline",textDecorationColor:$.t2,textUnderlineOffset:2}}>{p.name}</span>
<span style={{...M,fontWeight:700,color:PC[p.pos],fontSize:10,textAlign:"center"}}>{p.pos}</span>

<span style={{...M,fontWeight:700,color:$.t0,textAlign:"center"}}>{p.ovr}</span>
<span style={{...M,fontWeight:600,color:p.potGap>=15?"#2ecc71":p.potGap>=8?"#f1c40f":$.t6,fontSize:11,textAlign:"center"}}>{p.pot}</span>
<span style={{...M,textAlign:"center",color:p.ovr1<p.ovr?"#e74c3c":p.ovr1>p.ovr?"#2ecc71":$.t6}}>{p.ovr1}</span>
<span style={{...M,textAlign:"center",color:p.ovr2<p.ovr?"#e74c3c":p.ovr2>p.ovr?"#2ecc71":$.t6}}>{p.ovr2}</span>
<span style={{...M,textAlign:"center",color:p.ovr3<p.ovr?"#e74c3c":p.ovr3>p.ovr?"#2ecc71":$.t6}}>{p.ovr3}</span>
<span style={{...M,textAlign:"center",fontWeight:700,fontSize:11,color:p.chg3>0?"#2ecc71":p.chg3>=-3?"#e67e22":"#e74c3c"}}>{p.chg3>0?"+":""}{p.chg3}</span>
</div>)}
</div>
</>}

<div style={{textAlign:"center",padding:"10px 0 4px",fontSize:9,color:$.t0b,...M}}>Formulas from zengm-games/zengm · OVR calculated exactly like in-game</div>
{selP&&<PlayerDetail p={selP} onClose={()=>setSelP(null)}/>}
</div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
